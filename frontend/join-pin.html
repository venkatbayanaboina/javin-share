<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JAVIN FileShare — Join Session</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#020617" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <script>
    (function() {
      const t = localStorage.getItem('theme');
      if (t === 'light' || (!t && window.matchMedia('(prefers-color-scheme: light)').matches)) {
        document.documentElement.classList.add('light-theme');
      }
    })();
  </script>
</head>
<body class="page-pin">
  <div class="wrap">
    
    <!-- Page status alerts -->
    <div id="page-status" class="page-status is-hidden" role="status" aria-live="polite"></div>

    <!-- Header Component -->
    <div class="hdr anim1">
      <span class="hdr-title">JAVIN FileShare</span>
      <div style="display: flex; align-items: center; gap: 12px;">
        <button id="theme-toggle" type="button" title="Toggle Theme">☀️</button>
        <span class="hdr-badge" style="color:#f59e0b; background:rgba(245,158,11,.14); border:1px solid rgba(245,158,11,.28)">⬡ Join Session</span>
      </div>
    </div>

    <!-- Block 1: Main Join Card -->
    <div class="card card-accent-indigo-cyan anim2" style="max-width: 460px; margin: 20px auto 0; display: flex; flex-direction: column; gap: 20px;">
      
      <header style="text-align: center; border-bottom: var(--border-glass); padding-bottom: 16px;">
        <div style="font-family: var(--font-mono); font-size: 0.65rem; color: var(--indigo); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;">[ NODE IDENTIFIER ]</div>
        <h2 style="font-family: var(--font-sans); font-size: 1.25rem; font-weight: 700; color: var(--text-primary);">Join Session</h2>
        <p id="header-description" style="font-family: var(--font-sans); font-size: 0.8rem; color: var(--sub); margin-top: 4px;">Enter your name and the 6-digit PIN from the host.</p>
      </header>

      <form id="pin-form" style="display: flex; flex-direction: column; gap: 16px;">
        <!-- Device Name Input -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-family: var(--font-mono); font-size: 0.60rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;">YOUR NAME</label>
          <input
            type="text"
            id="device-name-input"
            placeholder="e.g., iPhone 15, Laptop"
            maxlength="40"
            autocomplete="off"
            required
          />
        </div>

        <!-- Multi-box PIN Input -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-family: var(--font-mono); font-size: 0.60rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;">SESSION PIN</label>
          
          <div class="multi-pin-container">
            <input type="tel" class="pin-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off" required aria-label="Digit 1" />
            <input type="tel" class="pin-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off" required aria-label="Digit 2" />
            <input type="tel" class="pin-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off" required aria-label="Digit 3" />
            <input type="tel" class="pin-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off" required aria-label="Digit 4" />
            <input type="tel" class="pin-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off" required aria-label="Digit 5" />
            <input type="tel" class="pin-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off" required aria-label="Digit 6" />
          </div>

          <!-- Hidden fallback input representing raw PIN expected by scripts -->
          <input type="hidden" id="pin-input" name="pin" />
        </div>

        <!-- PIN Timer Countdown -->
        <div id="pin-timer" style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 4px;">Time left: --:--</div>
        
        <button type="submit" id="connect-btn" class="btn-primary" style="width: 100%;">
          [ CONNECT ]
        </button>
      </form>

      <!-- Alert Banners -->
      <div id="error-message" class="pin-error is-hidden"></div>
      
      <div id="status-message" class="is-hidden" style="background: rgba(6, 182, 212, 0.05); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px; font-family: var(--font-mono); font-size: 0.8rem; border-radius: 8px;"></div>
      
      <div style="text-align: center; font-size: 0.75rem; border-top: var(--border-glass); padding-top: 14px; margin-top: 6px;">
        <span style="color: var(--muted);">Need to host?</span> <a href="/host.html" style="color: var(--indigo); text-decoration: none;">[ START HOST NODE ]</a>
      </div>
    </div>

    <!-- State 3: Success Modal Overlay popup -->
    <div id="popupMessage" class="modal-overlay is-hidden">
      <div class="modal-card">
        <button type="button" id="popupClose" style="display: none;"></button>
        <div class="check-circle">✓</div>
        <h2 id="popupTitle" style="font-family: var(--font-mono); font-size: 1.1rem; color: var(--emerald); letter-spacing: 1px; margin-bottom: 6px;">✓ VERIFIED</h2>
        <p id="popupBody" style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--sub);">JOINING NETWORK...</p>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="assets/js/core/index.js"></script>
  <script type="module" src="assets/js/pages/join-pin.js"></script>
</body>
</html>
